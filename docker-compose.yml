# Local multi-container setup for backend + frontend + Postgres.
#
# Assumes the frontend repo is checked out as a sibling directory:
#   IdeaProjects/
#     student-performance-dossier/            (this repo)
#     student-performance-dossier-frontend/
#
# Usage:
#   cp .env.example .env   # fill in DB_PASSWORD and JWT_SECRET
#   docker compose up --build
# Then: backend at http://localhost:8080, frontend at http://localhost:5173

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: student_performance_dossier
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    environment:
      DB_URL: jdbc:postgresql://db:5432/student_performance_dossier
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../student-performance-dossier-frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db-data:
